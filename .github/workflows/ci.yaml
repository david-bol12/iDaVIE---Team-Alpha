# Unity Editor build (job `unity-editor-build`) requires a one-time licence
# activation against the GameCI `unity-request-activation-file@v2` action.
# Steps for whoever sets this up:
#   1. Run `unity-request-activation-file@v2` in a throwaway workflow.
#   2. Download the produced `Unity_v2021.x.alf` artefact.
#   3. Visit https://license.unity3d.com/manual, sign in with the Unity
#      student account, upload the `.alf`, download the resulting `.ulf`.
#   4. Paste the `.ulf` contents into a repo secret named UNITY_LICENSE.
# Until that secret exists, `unity-editor-build` is skipped (see its `if:`).
#
# Job ordering is deliberate: Windows is the production runtime target (VR
# headset drivers are Windows-only), so the Windows native-plugin build,
# Windows test harness, and Unity Windows player build are the primary jobs.
# The Linux native-plugin jobs are kept as secondary smoke checks — they give
# fast (~2 min) feedback because Ubuntu apt packages are pre-cached, whereas
# the Windows vcpkg path is ~20-40 min cold (a few seconds with cache).

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # Primary: Windows (production runtime target)
  # ------------------------------------------------------------------

  native-plugin-windows:
    name: Native plugin (Windows) [primary]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('native_plugins_cmake/CMakeLists.txt', '.github/workflows/ci.yaml') }}

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install cfitsio starlink-ast cminpack --triplet x64-windows

      - name: Configure and build
        shell: pwsh
        run: |
          cmake -S native_plugins_cmake -B native_plugins_cmake/build `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -A x64
          cmake --build native_plugins_cmake/build --config Release --parallel

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: idavie_native-windows
          path: native_plugins_cmake/build/Release/idavie_native.dll
          if-no-files-found: error

  native-plugin-tests-windows:
    name: Native plugin tests (Windows) [primary]
    runs-on: windows-latest
    needs: native-plugin-windows
    steps:
      - uses: actions/checkout@v4

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('native_plugins_cmake/CMakeLists.txt', '.github/workflows/ci.yaml') }}

      - name: Install vcpkg dependencies (no-op on cache hit)
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install cfitsio starlink-ast cminpack --triplet x64-windows

      - name: Rebuild plugin (harness links against the .lib / .dll)
        shell: pwsh
        run: |
          cmake -S native_plugins_cmake -B native_plugins_cmake/build `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -A x64
          cmake --build native_plugins_cmake/build --config Release --parallel

      - name: Build harness
        shell: pwsh
        run: |
          cmake -S tests -B tests/build `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -A x64
          cmake --build tests/build --config Release --parallel

      - name: Run harness against fixture FITS cube
        shell: pwsh
        run: tests\build\Release\test_fits_reader.exe Data\SampleData\test_volume.fits

  unity-editor-build:
    name: Unity Editor build (StandaloneWindows64) [primary]
    runs-on: ubuntu-latest
    if: ${{ secrets.UNITY_LICENSE != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Unity Library/
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 2021.3.45f2
          testMode: editmode
          checkName: EditMode results
        continue-on-error: true # no EditMode tests exist yet; pass through

      - name: Build StandaloneWindows64
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 2021.3.45f2
          targetPlatform: StandaloneWindows64

      - name: Upload player artifact
        uses: actions/upload-artifact@v4
        with:
          name: iDaVIE-StandaloneWindows64
          path: build/StandaloneWindows64
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Secondary: Linux (fast smoke for the native plugin port)
  # ------------------------------------------------------------------

  native-plugin-linux:
    name: Native plugin (Linux) [secondary smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libcfitsio-dev libcminpack-dev libstarlink-ast-dev \
            libomp-dev

      - name: Configure and build
        run: |
          cmake -S native_plugins_cmake -B native_plugins_cmake/build -DCMAKE_BUILD_TYPE=Release
          cmake --build native_plugins_cmake/build --parallel

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: idavie_native-linux
          path: native_plugins_cmake/build/libidavie_native.so
          if-no-files-found: error

  native-plugin-tests-linux:
    name: Native plugin tests (Linux) [secondary smoke]
    runs-on: ubuntu-latest
    needs: native-plugin-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libcfitsio-dev libcminpack-dev libstarlink-ast-dev \
            libomp-dev

      - name: Rebuild plugin (harness links against the .so)
        run: |
          cmake -S native_plugins_cmake -B native_plugins_cmake/build -DCMAKE_BUILD_TYPE=Release
          cmake --build native_plugins_cmake/build --parallel

      - name: Build harness
        run: |
          cmake -S tests -B tests/build
          cmake --build tests/build --parallel

      - name: Run harness against fixture FITS cube
        run: tests/build/test_fits_reader Data/SampleData/test_volume.fits

  # ------------------------------------------------------------------
  # Cross-cutting
  # ------------------------------------------------------------------

  csharp-lint:
    name: C# lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: License-header scan (warn-only on first run)
        run: |
          set -euo pipefail
          missing=$(grep -L "iDaVIE is free software" $(find Assets/Scripts -name '*.cs') || true)
          if [ -n "$missing" ]; then
            echo "::warning::C# files missing the LGPL v3 licence header:"
            echo "$missing" | while read -r f; do echo "::warning file=$f::missing LGPL header"; done
            {
              echo "## Missing LGPL header"
              echo ""
              echo "These \`.cs\` files under \`Assets/Scripts/\` are missing the LGPL v3 sentinel \"iDaVIE is free software\":"
              echo ""
              echo '```'
              echo "$missing"
              echo '```'
              echo ""
              echo "First-run behaviour is **warn-only**. Flip this check to hard-fail in \`.github/workflows/ci.yaml\` once a cleanup PR adds the missing headers."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All .cs files have the LGPL header."
          fi

      - name: Trailing whitespace check (warn-only on first run)
        # ~95% of existing .cs files have trailing whitespace; flipping to
        # hard-fail requires a one-line cleanup PR (e.g. `sed -i 's/ *$//'`).
        # Once that lands, change `::warning::` -> `::error::` and add
        # `exit 1` below.
        run: |
          set -euo pipefail
          offenders=$(grep -rIln ' $' Assets/Scripts --include='*.cs' || true)
          if [ -n "$offenders" ]; then
            count=$(echo "$offenders" | wc -l)
            echo "::warning::$count .cs file(s) have trailing whitespace"
            {
              echo "## Trailing whitespace"
              echo ""
              echo "$count file(s) under \`Assets/Scripts/\` have trailing whitespace. Warn-only on first run; flip to hard-fail once a cleanup PR lands."
              echo ""
              echo '```'
              echo "$offenders" | head -50
              if [ "$count" -gt 50 ]; then echo "... ($((count - 50)) more)"; fi
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
